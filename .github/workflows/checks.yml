---
name: Checks

on:
  push:
    branches: 
      - "*"
    tags: 
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  test-image:
    name: Type checking, linting, tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.14
            3.13
            3.12
            3.11
            3.10

      - name: Install python dependencies
        run: pip install -r requirements/dev.txt

      - name: Run style checking
        run: make style

      - name: Run type checking
        run: make mypy

      - name: Run linting
        run: make lint

      - name: Run tests
        run: make test
